<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Website Demo</title>

<style>

/* =========================================================
   GLOBAL RESET / SAFETY
   - Removes default margins
   - Prevents horizontal scrolling issues
   - Ensures consistent box sizing across elements
========================================================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

* {
  box-sizing: border-box;
}

/* =========================================================
   MAIN PAGE LAYOUT
   - Vertical layout: header / gallery / footer
   - Full screen height
========================================================= */
body {
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

/* =========================================================
   BACKGROUND IMAGE LAYER
   - Fixed full-screen background image
   - Semi-transparent dark overlay for readability
========================================================= */
body::before {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("IMAGES/ui/background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0.25;
  z-index:-2;
}

body::after {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

/* =========================================================
   HEADER / FOOTER CONTAINERS
========================================================= */
header, footer {
  background: transparent;
  padding: 3px 13px;
}

header {
  padding-bottom: 12px;
}

footer {
  padding-top: 25px;
}

/* Header layout wrapper (centers logo + nav groups) */
.header-inner {
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  position:relative;
}

/* =========================================================
   NAVIGATION GROUPS (LEFT / RIGHT)
   - Positioned around logo on desktop
========================================================= */
.nav-group {
  display:flex;
  gap:18px;
  position:absolute;
}

/* 🔥 remove ALL default link styling */
.nav-group a {
  text-decoration: none;
  color: inherit;
  display: inline-block;
}

/* prevent blue/purple/visited states */
.nav-group a:link,
.nav-group a:visited,
.nav-group a:hover,
.nav-group a:active {
  text-decoration: none;
  color: inherit;
}

.nav-left {
  right: calc(50% + 200px); /* pushes left group outward */
}

.nav-right {
  left: calc(50% + 200px);  /* pushes right group outward */
}

/* =========================================================
   HEADER ICONS
========================================================= */
.nav-img {
  height: clamp(16px, 2vw, 28px); /* responsive scaling */
  cursor: pointer;
  opacity: 0.9;
  transition: 0.2s;
}

/* hover animation for nav icons */
.nav-img:hover {
  transform: scale(1.05);
  opacity: 1;
}
.youtube-icon:hover{
  transform: scale(1.95);
}

/* logo scales with screen size */
.logo {
  position: relative;
}
.logo img {
  height: 110px;
  width: auto;
  display: block;
}

/* =========================================================
   FOOTER ICONS
========================================================= */
.footer-inner {
  display:flex;
  justify-content:center;
  gap:14px;
}

/* social icons scale responsively */
.social-icon-img {
  width: clamp(60px, 2.8vw, 38px);
  height: clamp(60px, 2.8vw, 38px);
  object-fit: contain;
  cursor: pointer;
  transition: 0.2s;
}

.social-icon-img:hover {
  transform: scale(1.1);
}

.youtube-icon{
  transform: scale(1.9);
}
.tiktok-icon {
  transform: scale(1.1);
}
.tiktok-icon:hover {
  transform: scale(1.15);
}
.youtube-icon:hover{
  transform: scale(1.95);
}
#scroll-area {
    flex: 0 1 auto;   /* stop forcing full stretch */
    max-height: 74vh; /* limits gallery height */
    overflow-y: auto;
    
  }

/* =========================================================
   MOBILE HEADER ADJUSTMENTS
   - Removes absolute positioning
   - Compresses icon sizes
   - Prevents overflow
========================================================= */
@media (max-width: 700px) {

  header {
    padding: 3px;
    padding-top: 20px;
  }

  .header-inner {
    justify-content: space-between;
    gap: 8px;
  }

  /* nav becomes normal flow (no absolute positioning) */
  .nav-group {
    position: static;
    gap: 8px;
  }

  /* smaller icons for mobile */
  .nav-img {
    height: 14px;
  }

  .logo img {
    height: clamp(28px, 6vw, 28px);
    display:block;

  }

  .social-icon-img {
    width: 32px;
    height: 32px;
  }

  #scroll-area {
    flex: 0 1 auto;   /* stop forcing full stretch */
    max-height: 74vh; /* limits gallery height */
    overflow-y: auto;
    
  }

}

/* =========================================================
   GALLERY AREA
========================================================= */

#scroll-area {
  position:relative;
  flex:1;
  overflow-y:auto;
}

/* container holds all floating squares */
#container {
  position:relative;
  width:100%;
}

/* =========================================================
   INDIVIDUAL SQUARES
   - Positioned absolutely via JS
   - Animated scaling on hover / scroll
========================================================= */
.square {
  position:absolute;
  overflow:hidden;
  border-radius:14px;
  transition: transform 0.2s ease, opacity 0.25s ease, left 0.35s ease, top 0.35s ease;
  will-change: transform;
  cursor: grab;
  touch-action: none; /* 🔥 REQUIRED for mobile dragging */
}

.square:active {
  cursor: grabbing;
}

/* image fills square */
.square img {
  width:100%;
  height:100%;
  object-fit:contain; /* 🔥 keeps full image visible */
}

/* fallback style if image fails */
.square.fallback {
  background: linear-gradient(135deg, #444, #222);
  border: 1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* clickable link overlay */
.square a {
  position:absolute;
  bottom:5px;
  left:5px;
  right:5px;
  font-size:12px;
  color:white;
  text-decoration:none;
  padding:4px;
  text-align:center;
}
</style>
</head>

<body>

<!-- =========================================================
     SCROLLING GALLERY CONTAINER
========================================================= -->

<!-- =========================================================
     FOOTER ICONS
========================================================= -->
<footer>
  <div class="footer-inner">

    <a href="https://www.instagram.com/dashgeorge/"><img src="IMAGES/social/ig.png" class="social-icon-img"></a>

<script>

/* =========================================================
   DOM REFERENCES
========================================================= */
const container = document.getElementById('container');
const scrollArea = document.getElementById('scroll-area');

/* stores all square objects for animation */
let squares = [];

/* stores responsive layout settings */
let settings = getSettings();
let isRebuilding = false;

/* =========================================================
   RESPONSIVE SETTINGS
   - Adjusts layout based on screen size
========================================================= */
function getSettings() {
  const mobile = window.innerWidth < 700;

  return {
    COLS: mobile ? 2 : 3,

    /* MUCH LARGER SPACING */
    ROW_GAP: mobile ? 420 : 700,
    COL_GAP: mobile ? 260 : 520,

    /* pushes everything downward slightly */
    TOP_OFFSET: mobile ? 40 : 180,

    /* slightly larger objects */
    SIZE_SCALE: mobile ? 0.8 : 0.95
  };
}

/* =========================================================
   POSITIONING LOGIC
   - Desktop: grid layout
   - Mobile: vertical stack layout
========================================================= */
function getSafePosition(index) {

  const mobile = window.innerWidth < 700;

  /* ================= MOBILE LAYOUT ================= */
  if (mobile) {

    const containerWidth = scrollArea.clientWidth;

    return {
      x: containerWidth / 2 - 80, // center alignment
      y: settings.TOP_OFFSET + index * settings.ROW_GAP
    };
  }

  /* ================= DESKTOP GRID LAYOUT ================= */
  const col = index % settings.COLS;
  const row = Math.floor(index / settings.COLS);

  const containerWidth = scrollArea.clientWidth;

  /* wider spread */
  const totalWidth = settings.COL_GAP * (settings.COLS - 1);
  const startX = (containerWidth - totalWidth) / 2;

  const randomOffsetX = (Math.random() - 0.5) * 120;
  const randomOffsetY = (Math.random() - 0.5) * 160;

  const x =
    startX +
    col * settings.COL_GAP +
    randomOffsetX;

  const y =
    settings.TOP_OFFSET +
    row * settings.ROW_GAP +
    randomOffsetY;

  return {
    x,
    y
  };
}

/* =========================================================
   LOAD DATA (IMAGES + LINKS)
========================================================= */
async function loadData(){

  const res = await fetch('data.json');
  const data = await res.json();

  container.style.height =
  (Math.ceil(data.images.length / settings.COLS) * settings.ROW_GAP + 1200) + 'px';

  for (let i = 0; i < data.images.length; i++) {
    createSquare(data.images[i], data.links[i], i);
  }
}

/* =========================================================
   CREATE INDIVIDUAL SQUARE
========================================================= */

async function createSquare(imgName, linkFile, index){

  const baseSize = (160 + Math.random() * 120) * settings.SIZE_SCALE;
  const pos = getSafePosition(index);

  const div = document.createElement('div');
  div.className = 'square';

  const img = document.createElement('img');
  img.src = 'IMAGES/' + imgName;

  const a = document.createElement('a');

  /* 🔥 PREVENT MOBILE DOUBLE RENDER / FLASH */
  div.style.opacity = "0";

  /* Initial position */
  div.style.left = pos.x + 'px';
  div.style.top = pos.y + 'px';

  div.style.width = baseSize + 'px';
  div.style.height = baseSize + 'px';

  /* 🔥 KEEP IMAGE RATIO */
  img.onload = () => {
    const ratio = img.naturalWidth / img.naturalHeight;

    let width, height;

    if (ratio > 1) {
      width = baseSize * 1.2;
      height = width / ratio;
    } else {
      height = baseSize * 1.2;
      width = height * ratio;
    }

    div.style.width = width + 'px';
    div.style.height = height + 'px';
  };

  img.onerror = () => {
    div.classList.add('fallback');
  };

  /* ================= LINK ================= */

  try {
    const txt = await fetch('LINKS/' + linkFile).then(r => r.text());
    a.href = txt.trim();
    a.target = "_blank";
  } catch {}

  let wasDragging = false;

  div.addEventListener('pointerdown', () => {
    wasDragging = false;
  });

  div.addEventListener('pointermove', () => {
    if (squareObj.dragging) {
      wasDragging = true;
    }
  });

  a.addEventListener('click', (e) => {
    if (wasDragging) {
      e.preventDefault();
    }
  });

  /* ================= OBJECT STATE ================= */

  const squareObj = {
    el: div,
    x: pos.x,
    y: pos.y,

    originX: pos.x,
    originY: pos.y,

    hover: false,
    dragging: false
  };

  /* ================= HOVER ================= */
  div.addEventListener('mouseenter', () => squareObj.hover = true);
  div.addEventListener('mouseleave', () => squareObj.hover = false);

  /* ================= DRAG SYSTEM ================= */

  let offsetX = 0;
  let offsetY = 0;
  let pointerId = null;

  div.addEventListener('pointerdown', (e) => {
    squareObj.dragging = true;
    pointerId = e.pointerId;

    offsetX = e.clientX - div.offsetLeft;
    offsetY = e.clientY - div.offsetTop;

    div.setPointerCapture(pointerId);
    div.style.zIndex = 9999;

    e.preventDefault();
  });

  div.addEventListener('pointermove', (e) => {
    if (!squareObj.dragging || e.pointerId !== pointerId) return;

    const x = e.clientX - offsetX;
    const y = e.clientY - offsetY;

    div.style.left = x + 'px';
    div.style.top = y + 'px';

    squareObj.x = x;
    squareObj.y = y;
  });

  div.addEventListener('pointerup', (e) => {
    if (e.pointerId !== pointerId) return;

    squareObj.dragging = false;

    div.releasePointerCapture(pointerId);
    div.style.zIndex = '';

    div.style.left = squareObj.originX + 'px';
    div.style.top = squareObj.originY + 'px';

    squareObj.x = squareObj.originX;
    squareObj.y = squareObj.originY;
  });

  div.addEventListener('pointercancel', () => {
    squareObj.dragging = false;
    div.style.zIndex = '';

    div.style.left = squareObj.originX + 'px';
    div.style.top = squareObj.originY + 'px';

    squareObj.x = squareObj.originX;
    squareObj.y = squareObj.originY;
  });

  /* ================= APPEND ================= */

  div.appendChild(img);
  div.appendChild(a);
  container.appendChild(div);

  squares.push(squareObj);

  /* 🔥 SHOW AFTER FULL RENDER (fixes mobile double-image bug) */
  requestAnimationFrame(() => {
    div.style.opacity = "1";
  });
}

/* =========================================================
   ANIMATION LOOP (hover scaling effect)
========================================================= */
function updateSquares(){

  const scrollTop = scrollArea.scrollTop;
  const viewportCenter = scrollTop + scrollArea.clientHeight / 2;

  squares.forEach(sq => {

    const elTop = sq.y;
    const distance = Math.abs(viewportCenter - elTop);

    // how far before it disappears completely
    const range = 500;

    // normalized influence (0 → 1)
    let influence = 1 - (distance / range);
    influence = Math.max(0, Math.min(1, influence));

    let scale;
    let opacity;

    if (sq.hover) {
      scale = 1.7;
      opacity = 1;
    } else {
      scale = 0.6 + influence * 0.8;   // 0.6 → 1.4
      opacity = 0.2 + influence * 0.8; // 0.2 → 1
    }

    sq.el.style.transform = `scale(${scale})`;
    sq.el.style.opacity = opacity;
  });
}

/* infinite animation loop */
function animate(){
  if (squares.length > 0) {
    updateSquares();
  }
  requestAnimationFrame(animate);
}

/* =========================================================
   RESIZE HANDLER
========================================================= */
window.addEventListener('resize', () => {
  if (isRebuilding) return;

  isRebuilding = true;

  squares = [];
  container.innerHTML = "";

  settings = getSettings();

  // wait 1 frame so DOM actually clears before rebuilding
  requestAnimationFrame(() => {
    loadData().then(() => {
      isRebuilding = false;
    });
  });
});

/* START APP */
loadData();
animate();

</script>
